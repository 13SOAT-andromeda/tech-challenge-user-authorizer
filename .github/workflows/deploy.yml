name: Build and Deploy Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: AWS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: tech-challenge-user-authorizer-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: AWS
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Obter endereço do RDS
        working-directory: .
        run: |
          RDS_ADDRESS=$(aws rds describe-db-instances \--db-instance-identifier ${{ secrets.DB_INSTANCE_IDENTIFIER }} \--query "DBInstances[0].Endpoint.Address" --output text)
          echo "DB_HOST=$RDS_ADDRESS" >> $GITHUB_ENV
        -var="db_host=${{ env.DB_HOST }}" \

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.AWS_S3_TF_STATE_BUCKET_NAME }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ github.sha }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="jwt_issuer=${{ secrets.JWT_ISSUER }}" \
            -var="session_table_name=${{ secrets.SESSION_TABLE_NAME }}" \
            -var="dynamodb_endpoint=${{ secrets.DYNAMODB_ENDPOINT }}" \
            -var="dynamodb_table_name=${{ secrets.DYNAMODB_TABLE_NAME }}"
