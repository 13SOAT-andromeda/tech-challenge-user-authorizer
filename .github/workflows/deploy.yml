name: Build and Deploy Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: AWS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: tech-challenge-user-authorizer-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: AWS
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Obter endereço do RDS
        working-directory: .
        run: |
          RDS_ADDRESS=$(aws rds describe-db-instances \
            --db-instance-identifier ${{ secrets.DB_NAME }} \
            --query "DBInstances[0].Endpoint.Address" --output text)
          echo "DB_HOST=$RDS_ADDRESS" >> $GITHUB_ENV

      - name: Obter endpoint do DynamoDB
        working-directory: .
        run: |
          DYNAMO_ENDPOINT=$(aws dynamodb describe-endpoints \
            --query "Endpoints[0].Address" --output text)
          echo "DYNAMODB_ENDPOINT=https://$DYNAMO_ENDPOINT" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.AWS_S3_TF_STATE_BUCKET_NAME }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Import (recover existing resources into state)
        env:
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_db_host: ${{ env.DB_HOST }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_jwt_issuer: ${{ secrets.JWT_ISSUER }}
          TF_VAR_dynamodb_table_name: ${{ secrets.DYNAMODB_TABLE_NAME }}
          TF_VAR_dynamodb_endpoint: ${{ env.DYNAMODB_ENDPOINT }}
          TF_VAR_dynamodb_table_name: ${{ secrets.DYNAMODB_TABLE_NAME }}
        run: |
          terraform import aws_lambda_function.this tech-challenge-user-authorizer || true
          terraform import aws_lambda_function_url.this tech-challenge-user-authorizer || true
          terraform import aws_lambda_permission.allow_public_url tech-challenge-user-authorizer/AllowPublicAccess || true

      - name: Terraform Apply
        env:
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_db_host: ${{ env.DB_HOST }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_jwt_issuer: ${{ secrets.JWT_ISSUER }}
          TF_VAR_dynamodb_table_name: ${{ secrets.DYNAMODB_TABLE_NAME }}
          TF_VAR_dynamodb_endpoint: ${{ env.DYNAMODB_ENDPOINT }}
          TF_VAR_dynamodb_table_name: ${{ secrets.DYNAMODB_TABLE_NAME }}
        run: |
          terraform apply -auto-approve
